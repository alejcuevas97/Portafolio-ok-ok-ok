{%extends 'base.html'%}

{% load static %}


{% block content %}


  <!-- Tailwind CSS CDN with Dark Mode Configuration -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configure Tailwind to use class-based dark mode
    tailwind.config = {
      darkMode: 'class', // Enable class-based dark mode
      theme: {
        extend: {
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!-- Optional: Include Font Awesome for Icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
  <div class="min-h-screen flex flex-col">
<div class="relative h-screen overflow-hidden text-white bg-gradient from-purple-600 to-blue-600">
  <div class="absolute inset-0">
    <img src="https://images.unsplash.com/photo-1522252234503-e356532cafd5?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w0NzEyNjZ8MHwxfHNlYXJjaHw2fHxjb2RlfGVufDB8MHx8fDE2OTQwOTg0MTZ8MA&ixlib=rb-4.0.3&q=80&w=1080" alt="Background Image" class="object-cover object-center w-full h-full" />
    <div class="absolute inset-0 bg-black opacity-50"></div>
  </div>
  
  <div class="relative z-10 flex flex-col items-center justify-center h-full text-center">
    <h1 class="mb-4 text-5xl font-bold leading-tight">{% if request.LANGUAGE_CODE == 'es' %}Bienvenido a mi Portafolio{% else %}Welcome to my Portfolio{% endif %}</h1>
    <a href="{%url 'profile'%}" class="px-6 py-2 text-lg font-semibold text-gray-900 transition duration-300 ease-in-out transform bg-yellow-400 rounded-full hover:bg-yellow-300 hover:scale-105 hover:shadow-lg">{% if request.LANGUAGE_CODE == 'es' %}Iniciar{% else %}Start{% endif %}</a>
  </div>
</div>

    
{% endblock content %}
