<!-- Footer Component with Smart Show/Hide on Scroll + bottom-detection -->
<style>
  .footer-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: #f3f4f6;
    border-top: 1px solid #e5e7eb;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(.2,.9,.2,1);
    z-index: 40;
  }

  .footer-container.visible {
    transform: translateY(0);
  }
</style>

<footer id="footer-element" class="footer-container px-6 sm:px-10 md:px-16 py-6 text-center" aria-hidden="true">
  <p class="text-gray-700 text-sm">
    © 2025 Alejandro Cuevas González | {% if request.LANGUAGE_CODE == 'es' %}Desarrollador Backend{% else %}Backend Developer{% endif %} | Designed by @alejcuevas97
  </p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const footer = document.getElementById('footer-element');
  if (!footer) return;

  let lastY = window.pageYOffset || document.documentElement.scrollTop;
  const threshold = 100; // no mostrar si scroll muy pequeño
  const bottomGap = 50; // px desde el final para considerarlo "final"

  function footerVisible() {
    footer.classList.add('visible');
    footer.setAttribute('aria-hidden', 'false');
    document.body.style.paddingBottom = footer.offsetHeight + 'px';
  }

  function footerHidden() {
    footer.classList.remove('visible');
    footer.setAttribute('aria-hidden', 'true');
    document.body.style.paddingBottom = '';
  }

  function isAtBottom() {
    return (window.innerHeight + window.pageYOffset) >= (document.body.offsetHeight - bottomGap);
  }

  // Estado inicial
  if (isAtBottom()) footerVisible(); else footerHidden();

  let ticking = false;
  window.addEventListener('scroll', function() {
    if (ticking) return;
    ticking = true;
    window.requestAnimationFrame(function() {
      const currentY = window.pageYOffset || document.documentElement.scrollTop;

      if (isAtBottom()) {
        footerVisible();
      } else if (currentY > lastY && currentY > threshold) {
        // scroll down -> ocultar
        footerHidden();
      } else if (currentY < lastY) {
        // scroll up -> mostrar
        footerVisible();
      }

      lastY = Math.max(0, currentY);
      ticking = false;
    });
  }, { passive: true });

  // Recalcular padding al cambiar tamaño
  window.addEventListener('resize', function() {
    if (footer.classList.contains('visible')) {
      document.body.style.paddingBottom = footer.offsetHeight + 'px';
    }
  });
});
</script>
